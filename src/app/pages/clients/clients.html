<sk-page-container>

  <sk-breadcrumb [items]="[{ label: 'Dashboard', route: '/dashboard' }, { label: 'Clients' }]" />

  <sk-page-header title="Clients" subtitle="Manage your gym members and clients.">
    <sk-button *skHasRole="P.clients.create" variant="primary" size="sm" (click)="onAddClient()">
      <span class="material-symbols-outlined text-[16px]">person_add</span>
      Add Client
    </sk-button>
  </sk-page-header>

  @if (isAdmin()) {
    <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-6">
      <div class="max-w-sm">
        <sk-async-select
          label="Company"
          placeholder="Search for a company…"
          [loadFn]="companyLoadFn"
          [formControl]="companySelectorControl"
        />
        <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">Select a company to view its clients.</p>
      </div>
    </div>
  }

  <sk-table
    [columns]="columns"
    [loadFn]="loadFn()"
    [pageSize]="5"
    [pageSizeOptions]="[5, 10, 25, 50]"
    [clickable]="true"
    (rowClick)="onClientClick($event)"
    [emptyMessage]="isAdmin() && !companyId() ? 'Select a company above to view its clients.' : 'No clients found matching your filters.'"
  />

</sk-page-container>
