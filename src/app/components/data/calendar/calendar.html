<div class="rounded-xl border border-slate-200 dark:border-border-dark bg-white dark:bg-surface-dark overflow-hidden">
  <!-- Header -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100 dark:border-border-dark">
    <div class="flex items-center gap-2">
      <button
        type="button"
        class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 transition-colors"
        (click)="prevMonth()"
        aria-label="Previous month"
      >
        <span class="material-symbols-outlined text-[20px]">chevron_left</span>
      </button>
      <button
        type="button"
        class="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 transition-colors"
        (click)="nextMonth()"
        aria-label="Next month"
      >
        <span class="material-symbols-outlined text-[20px]">chevron_right</span>
      </button>
    </div>

    <h2 class="text-sm font-semibold text-slate-800 dark:text-white">{{ monthLabel() }}</h2>

    <button
      type="button"
      class="px-3 py-1.5 text-xs font-medium rounded-lg border border-slate-200 dark:border-border-dark text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
      (click)="today()"
    >
      Today
    </button>
  </div>

  <!-- Day headers -->
  <div class="grid grid-cols-7 border-b border-slate-100 dark:border-border-dark">
    @for (day of weekDays; track day) {
      <div class="py-2 text-center text-xs font-medium text-slate-400 uppercase tracking-wide">{{ day }}</div>
    }
  </div>

  <!-- Calendar grid -->
  <div class="grid grid-cols-7 divide-x divide-y divide-slate-100 dark:divide-border-dark">
    @for (cell of cells(); track cell.iso) {
      <button
        type="button"
        [disabled]="readonly()"
        (click)="selectDate(cell)"
        [class]="
          'min-h-[5rem] p-2 flex flex-col gap-1 text-left transition-colors ' +
          (!cell.currentMonth
            ? 'bg-slate-50/50 dark:bg-background-dark/30'
            : cell.selected
              ? 'bg-primary/5'
              : 'hover:bg-slate-50 dark:hover:bg-slate-800/40') +
          (readonly() ? ' cursor-default' : ' cursor-pointer')
        "
        [attr.aria-label]="cell.date.toDateString()"
        [attr.aria-pressed]="cell.selected"
      >
        <span
          [class]="
            'inline-flex items-center justify-center w-7 h-7 text-xs font-medium rounded-full transition-colors ' +
            (!cell.currentMonth
              ? 'text-slate-300 dark:text-slate-600'
              : cell.selected
                ? 'bg-primary text-white'
                : cell.today
                  ? 'text-primary font-semibold ring-1 ring-primary/50'
                  : 'text-slate-700 dark:text-slate-300')
          "
        >
          {{ cell.date.getDate() }}
        </span>

        @for (event of cell.events.slice(0, 2); track $index) {
          <span
            [class]="
              'w-full truncate text-[10px] font-medium px-1.5 py-0.5 rounded text-white ' +
              eventColorClass(event.color)
            "
          >
            {{ event.label }}
          </span>
        }
        @if (cell.events.length > 2) {
          <span class="text-[10px] text-slate-400 pl-1">+{{ cell.events.length - 2 }} more</span>
        }
      </button>
    }
  </div>
</div>
