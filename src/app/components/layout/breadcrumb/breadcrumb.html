<nav aria-label="Breadcrumb">
  <ol class="flex items-center gap-1.5 text-sm">
    @for (item of items(); track item.label; let last = $last) {
      <li class="flex items-center gap-1.5">
        @if (!last) {
          @if (item.route) {
            <a
              [routerLink]="item.route"
              class="text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors font-medium"
            >
              {{ item.label }}
            </a>
          } @else {
            <span class="text-slate-500 dark:text-slate-400 font-medium">{{ item.label }}</span>
          }
          <span
            class="material-symbols-outlined text-slate-300 dark:text-slate-600 text-[16px]"
            aria-hidden="true"
          >
            chevron_right
          </span>
        } @else {
          <span
            class="text-slate-900 dark:text-white font-semibold"
            aria-current="page"
          >
            {{ item.label }}
          </span>
        }
      </li>
    }
  </ol>
</nav>
