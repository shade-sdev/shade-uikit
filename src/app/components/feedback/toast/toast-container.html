<div [class]="containerClass()" aria-live="polite" aria-atomic="false" role="region" aria-label="Notifications">
  @for (t of toast.toasts(); track t.id) {
    <div
      [class]="
        'pointer-events-auto w-full flex items-start gap-3 p-4 rounded-xl shadow-lg border ' +
        'bg-white dark:bg-surface-dark ' +
        toastColors(t.type) +
        (t.dismissing ? ' sk-toast-exit' : ' sk-toast-enter')
      "
      role="alert"
    >
      <span class="material-symbols-outlined text-[20px] shrink-0 mt-0.5">
        {{ toastIcon(t.type) }}
      </span>
      <div class="flex-1 min-w-0">
        @if (t.title) {
          <p class="text-sm font-semibold text-slate-900 dark:text-white">{{ t.title }}</p>
        }
        <p class="text-sm text-slate-700 dark:text-slate-300">{{ t.message }}</p>
      </div>
      <button
        type="button"
        (click)="toast.dismiss(t.id)"
        class="shrink-0 rounded p-0.5 opacity-60 hover:opacity-100 transition-opacity"
        aria-label="Dismiss notification"
      >
        <span class="material-symbols-outlined text-[18px]">close</span>
      </button>
    </div>
  }
</div>
