<div class="flex flex-col gap-1.5">
  @if (label()) {
    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ label() }}</span>
  }
  <div
    [class]="
      'inline-flex rounded-lg border border-slate-200 dark:border-border-dark overflow-hidden ' +
      (_disabled() ? 'opacity-50' : '') +
      (fullWidth() ? ' w-full' : '')
    "
    role="group"
    [attr.aria-label]="label()"
  >
    @for (option of options(); track option.value; let last = $last) {
      <button
        type="button"
        (click)="select(option.value)"
        [disabled]="_disabled()"
        [attr.aria-pressed]="isActive(option.value)"
        [class]="
          'flex items-center justify-center gap-1.5 font-semibold transition-all ' +
          sizeClass() +
          (fullWidth() ? ' flex-1' : '') +
          (!last ? ' border-r border-slate-200 dark:border-border-dark' : '') +
          (isActive(option.value)
            ? ' bg-primary text-white'
            : ' bg-white dark:bg-surface-dark text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800')
        "
      >
        @if (option.icon) {
          <span class="material-symbols-outlined text-[18px]">{{ option.icon }}</span>
        }
        {{ option.label }}
      </button>
    }
  </div>
</div>
