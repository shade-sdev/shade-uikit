<div class="flex flex-col gap-1.5 w-full">
  @if (label()) {
    <label [for]="id()" class="text-sm font-medium text-slate-700 dark:text-slate-300">
      {{ label() }}
      @if (required()) {
        <span class="text-rose-500 ml-0.5" aria-hidden="true">*</span>
      }
    </label>
  }

  <div class="relative">
    @if (prefixIcon()) {
      <span
        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px] pointer-events-none"
      >
        {{ prefixIcon() }}
      </span>
    }

    <input
      [id]="id()"
      [type]="resolvedType()"
      [value]="_value() ?? ''"
      [placeholder]="placeholder()"
      [disabled]="_disabled()"
      [required]="required()"
      [class]="inputClass()"
      [attr.aria-describedby]="error() ? id() + '-error' : hint() ? id() + '-hint' : null"
      [attr.aria-invalid]="error() ? 'true' : null"
      (input)="handleInput($event)"
      (blur)="handleBlur()"
    />

    @if (type() === 'password') {
      <button
        type="button"
        (click)="showPassword.update((v) => !v)"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors"
        [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
      >
        <span class="material-symbols-outlined text-[20px]">
          {{ showPassword() ? 'visibility_off' : 'visibility' }}
        </span>
      </button>
    } @else if (suffixIcon()) {
      <span
        class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px] pointer-events-none"
      >
        {{ suffixIcon() }}
      </span>
    }
  </div>

  @if (error()) {
    <p [id]="id() + '-error'" class="text-xs text-rose-500 font-medium flex items-center gap-1">
      <span class="material-symbols-outlined text-[14px]">error</span>
      {{ error() }}
    </p>
  } @else if (hint()) {
    <p [id]="id() + '-hint'" class="text-xs text-slate-500 dark:text-slate-400">{{ hint() }}</p>
  }
</div>
