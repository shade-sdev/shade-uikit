<fieldset class="flex flex-col gap-1.5">
  @if (label()) {
    <legend class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">{{ label() }}</legend>
  }
  <div [class]="'flex gap-3 ' + (layout() === 'horizontal' ? 'flex-row flex-wrap' : 'flex-col')">
    @for (option of options(); track option.value) {
      <label
        class="flex items-start gap-3 cursor-pointer group"
        [class.opacity-50]="option.disabled || _disabled()"
        [class.cursor-not-allowed]="option.disabled || _disabled()"
        (click)="select(option.value, option.disabled)"
      >
        <div class="relative mt-0.5 shrink-0">
          <input
            type="radio"
            [name]="name()"
            [checked]="isSelected(option.value)"
            [disabled]="option.disabled || _disabled()"
            class="sr-only"
            (change)="select(option.value, option.disabled)"
          />
          <div
            [class]="
              'size-5 rounded-full border-2 flex items-center justify-center transition-all ' +
              (isSelected(option.value)
                ? 'border-primary'
                : 'border-slate-300 dark:border-slate-600 group-hover:border-primary/60')
            "
          >
            @if (isSelected(option.value)) {
              <div class="size-2.5 rounded-full bg-primary"></div>
            }
          </div>
        </div>
        <div class="flex flex-col gap-0.5">
          <span class="text-sm font-medium text-slate-900 dark:text-white">{{ option.label }}</span>
          @if (option.hint) {
            <span class="text-xs text-slate-500 dark:text-slate-400">{{ option.hint }}</span>
          }
        </div>
      </label>
    }
  </div>
</fieldset>
