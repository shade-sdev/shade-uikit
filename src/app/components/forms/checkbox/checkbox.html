<label
  [for]="id()"
  class="inline-flex items-start gap-3 cursor-pointer group"
  [class.opacity-50]="_disabled()"
  [class.cursor-not-allowed]="_disabled()"
>
  <div class="relative mt-0.5 shrink-0">
    <input
      type="checkbox"
      [id]="id()"
      [checked]="_value() === true"
      [indeterminate]="indeterminate()"
      [disabled]="_disabled()"
      (change)="toggle()"
      class="sr-only"
    />
    <div
      [class]="
        'size-5 rounded border-2 flex items-center justify-center transition-all ' +
        (_value() || indeterminate()
          ? 'bg-primary border-primary'
          : 'border-slate-300 dark:border-slate-600 group-hover:border-primary/60 bg-white dark:bg-background-dark')
      "
    >
      @if (indeterminate()) {
        <span class="material-symbols-outlined text-white text-[14px]">remove</span>
      } @else if (_value()) {
        <span class="material-symbols-outlined text-white text-[14px]">check</span>
      }
    </div>
  </div>

  @if (label()) {
    <div class="flex flex-col gap-0.5">
      <span class="text-sm font-medium text-slate-900 dark:text-white">{{ label() }}</span>
      @if (hint()) {
        <span class="text-xs text-slate-500 dark:text-slate-400">{{ hint() }}</span>
      }
    </div>
  }
</label>
