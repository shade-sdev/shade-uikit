<label
  [for]="id()"
  class="inline-flex items-center gap-3 cursor-pointer"
  [class.opacity-50]="_disabled()"
  [class.cursor-not-allowed]="_disabled()"
  [class.flex-row-reverse]="labelPosition() === 'left'"
>
  <button
    type="button"
    role="switch"
    [id]="id()"
    [attr.aria-checked]="_value() === true"
    [disabled]="_disabled()"
    (click)="toggle()"
    [class]="
      'relative inline-flex h-6 w-11 shrink-0 rounded-full border-2 border-transparent transition-colors duration-200 ' +
      'focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 ' +
      (_value() ? 'bg-primary' : 'bg-slate-200 dark:bg-slate-700')
    "
  >
    <span
      [class]="
        'pointer-events-none inline-block size-5 rounded-full bg-white shadow-sm transition-transform duration-200 ' +
        (_value() ? 'translate-x-5' : 'translate-x-0')
      "
    ></span>
  </button>

  @if (label()) {
    <div class="flex flex-col gap-0.5">
      <span class="text-sm font-medium text-slate-900 dark:text-white">{{ label() }}</span>
      @if (hint()) {
        <span class="text-xs text-slate-500 dark:text-slate-400">{{ hint() }}</span>
      }
    </div>
  }
</label>
