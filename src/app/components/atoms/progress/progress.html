<div class="w-full space-y-1.5">
  @if (label() || showValue()) {
    <div class="flex items-center justify-between text-xs font-medium text-slate-700 dark:text-slate-300">
      @if (label()) {
        <span>{{ label() }}</span>
      }
      @if (showValue()) {
        <span>{{ percentageLabel() }}</span>
      }
    </div>
  }
  <div
    [class]="'w-full rounded-full bg-slate-100 dark:bg-slate-800 overflow-hidden ' + trackHeight()"
    role="progressbar"
    [attr.aria-valuenow]="value()"
    [attr.aria-valuemin]="0"
    [attr.aria-valuemax]="max()"
    [attr.aria-label]="label() || 'Progress'"
  >
    <div
      [class]="'h-full rounded-full transition-all duration-500 ease-out ' + barColor()"
      [style.width.%]="percentage()"
    ></div>
  </div>
</div>
